        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "어떤 문의가 우선순위가 높나요?",
              "acceptedAnswer": {"@type": "Answer", "text": "채용/인터뷰, 명확한 프로젝트 범위가 있는 협업, 실행 일정이 정의된 문의를 우선 확인합니다."}
            },
            {
              "@type": "Question",
              "name": "문의 시 어떤 정보를 포함하면 좋나요?",
              "acceptedAnswer": {"@type": "Answer", "text": "문의 목적, 희망 일정, 예산 범위, 유입 경로를 포함하면 빠르게 우선순위와 적합도를 검토할 수 있습니다."}

    <header class="site-header">
        <nav class="main-nav">

            </ul>
            <button class="nav-toggle" aria-label="메뉴 열기">☰</button>
        </nav>
    </header>

    <main class="main-content">
        <div class="container">
            <h1 class="page-title">Contact</h1>
            <p class="page-subtitle">
                협업/채용/컨설팅 문의를 남겨주세요. 우선순위와 맥락이 명확한 문의일수록 더 빠르게 응답합니다.
            </p>

            <section class="contact-section">
                <div class="contact-grid">
                    <div class="contact-item">
                        <div class="contact-icon">📧</div>
                        <div class="contact-details">
                            <h3>이메일</h3>
                            <p><a href="mailto:jarelrs@gmail.com">jarelrs@gmail.com</a></p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">📱</div>
                        <div class="contact-details">
                            <h3>전화번호</h3>
                            <p><a href="tel:+82-10-3810-9130">010-3810-9130</a></p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">📍</div>
                        <div class="contact-details">
                            <h3>위치</h3>
                            <p>서울, 대한민국</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">💼</div>
                        <div class="contact-details">
                            <h3>현재 상태</h3>
                            <p>독립 프로젝트 및 포트폴리오 고도화 진행 중<br>Product Strategy · AI/ML</p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="contact-section" style="margin-top:1.5rem;">
                <h2 style="font-size:1.4rem; margin-bottom:0.8rem;">CRM Inquiry (Demo)</h2>
                <form id="crmContactForm" class="crm-form">
                    <input name="name" required placeholder="이름">
                    <input name="email" type="email" required placeholder="이메일">
                    <select name="inquiryType">
                        <option value="project">프로젝트 협업</option>
                        <option value="hiring">채용/인터뷰</option>
                        <option value="consulting">컨설팅</option>
                    </select>
                    <select name="budget">
                        <option value="unknown">예산 미정</option>
                        <option value="lt10m">1천만원 이하</option>
                        <option value="10m-50m">1천~5천만원</option>
                        <option value="gt50m">5천만원 이상</option>
                    </select>
                    <input name="timeline" placeholder="희망 일정 (예: 2주 내 시작)">
                    <input name="source" placeholder="유입 경로 (예: GitHub, 추천, 검색)">
                    <textarea name="message" rows="4" placeholder="요청 내용"></textarea>
                    <button type="submit">문의 저장</button>
                    <p id="crmResult" style="font-size:0.92rem; color:#334155; margin:0;"></p>
                </form>
            </section>
        </div>
    </main>
